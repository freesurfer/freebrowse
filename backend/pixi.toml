[workspace]
authors = ["Paul Wighton <pwighton@mgh.harvard.edu>"]
channels = ["conda-forge"]
description = "Re-write of initial FreeBrowse implementation, based off of github.com/niivue/fullstack-niivue-demo/"
name = "FreeBrowse backend"
platforms = ["linux-64", "osx-arm64"]
version = "2.0.0"

[tasks.dev]
# npm install first so fresh clones have the correct tsc version
cmd = """
  cd ../frontend && \
  npm install && \
  npm run build && \
  cd ../backend && \
  fastapi dev src/server.py
"""

[tasks.dev.env]
NIIVUE_BUILD_DIR = "../frontend/dist"
DATA_DIR = "../data"
SCENE_SCHEMA_ID = "freebrowse"
IMAGING_EXTENSIONS = '["*.nii", "*.nii.gz"]'
SERVERLESS_MODE = "false"

[tasks.dev-serverless]
# See tasks.dev comment re: npm install
cmd = """
  cd ../frontend && \
  npm install && \
  npm run build && \
  cd ../backend && \
  fastapi dev src/server.py
"""

[tasks.dev-serverless.env]
NIIVUE_BUILD_DIR = "../frontend/dist"
DATA_DIR = "../data"
SCENE_SCHEMA_ID = "freebrowse"
IMAGING_EXTENSIONS = '["*.nii", "*.nii.gz"]'
SERVERLESS_MODE = "true"

[dependencies]
fastapi = ">=0.115.5,<0.116"
nibabel = ">=5.0"
numpy = ">=1.24"
pyyaml = ">=6.0"
# Ensures consistent node/npm rather than relying on system install
nodejs = ">=20"

# --- ML feature: pytorch + monai + neurite ---------------------------------
[feature.ml.dependencies]
pytorch = ">=2.0"
monai = ">=1.3"

[feature.ml.pypi-dependencies]
neurite = { git = "https://github.com/adalca/neurite.git" }

[feature.ml.activation.env]
ENABLE_ML = "true"
MODELS_DIR = "../models"

# --- QA feature: thunderpack ------------------------------------------------
[feature.qa.pypi-dependencies]
thunderpack = { git = "https://github.com/JJGO/thunderpack.git" }

[feature.qa.activation.env]
ENABLE_QA = "true"
MASTER_JSON = "../data/master_rating_json_elucid.txt"

# --- Environments -----------------------------------------------------------
[environments]
default = []
ml = ["ml"]
qa = ["qa"]
full = ["ml", "qa"]
